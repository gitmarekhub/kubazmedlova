<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gallery</title>

  <!-- Swiper -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

  <!-- PhotoSwipe -->
  <link rel="stylesheet" href="https://unpkg.com/photoswipe@5/dist/photoswipe.css">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="swiper project-swiper">
  <div class="swiper-wrapper">

    <div class="swiper-slide">
      <a href="img/EX_01.webp" class="pswp-item">
        <img src="img/EX_01.webp">
      </a>
    </div>

    <div class="swiper-slide">
      <a href="img/EX_02.webp" class="pswp-item">
        <img src="img/EX_02.webp">
      </a>
    </div>

    <div class="swiper-slide">
      <a href="img/EX_03.webp" class="pswp-item">
        <img src="img/EX_03.webp">
      </a>
    </div>

  </div>

  <div class="swiper-button-prev"></div>
  <div class="swiper-button-next"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="carousel.js" type="module"></script>

</body>
</html>
